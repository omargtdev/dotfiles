set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ",xterm-256color:Tc"

# Remove solid background fills to let blur pass through
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
set -g pane-background-style 'bg=default'
set -g pane-active-background-style 'bg=default'
set -g status-style 'bg=default'

# Lazy vim recommendations
set -g focus-events on

# Scroll
set -g mouse on

# Mod key
set -g prefix C-a
bind C-a send-prefix

# Panes
bind v split-window -h -c "#{pane_current_path}"
bind q split-window -v -c "#{pane_current_path}"

# Reload conifg
bind C-r source-file $HOME/.config/tmux/tmux.conf

set -g base-index 1

# Resizing panes
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

# Move between panes
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Extra options of panes
bind -r m resize-pane -Z
bind -r ^ last-window

# Select windows
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-h select-window -t -1
bind -n M-l select-window -t +1
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1

# Move between windows
bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Create new window
bind w neww -c "#{pane_current_path}"

# Kill
bind c kill-pane
bind C kill-window
bind K kill-session

# Rename
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind R command-prompt -I "#S" "rename-session -- '%%'"

# Set vim movements (Mod + [)
set-window-option -g mode-keys vi
set -s escape-time 10

# Copy and paste with clipboard
# Mod + ] (Paste)
bind -T copy-mode-vi 'v' send -X begin-selection
#bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -selection clipboard'
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'wl-copy' # Wayland
